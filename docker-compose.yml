services:
  db:
    image: postgres:15 # Using version 15 for stability
    container_name: sql_class_db_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_class_2_db
    ports:
      - "5433:5432" # Maps local port 5433 to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Auto-run your table creation script on startup
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: